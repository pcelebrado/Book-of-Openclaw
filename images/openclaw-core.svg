<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none" role="img" aria-label="openclaw-core icon">
  <!-- Transparent background (default) -->

  <!-- === HEX CORE CHIP === -->
  <!-- Outer hexagon -->
  <path
    d="M256 44
       L408 132
       L408 308
       L256 396
       L104 308
       L104 132
       Z"
    fill="#1E293B"
  />

  <!-- Inner hexagon ring (cut-in look using stroke) -->
  <path
    d="M256 84
       L372 151
       L372 289
       L256 356
       L140 289
       L140 151
       Z"
    fill="none"
    stroke="#06B6D4"
    stroke-width="18"
    stroke-linejoin="round"
    opacity="0.95"
  />

  <!-- Chip core plate -->
  <rect x="184" y="164" width="144" height="128" rx="20" fill="#0F172A" opacity="0.55"/>

  <!-- Chip "pins" (top/bottom/left/right) -->
  <g fill="#06B6D4" opacity="0.95">
    <!-- top pins -->
    <rect x="200" y="144" width="20" height="22" rx="6"/>
    <rect x="236" y="144" width="20" height="22" rx="6"/>
    <rect x="272" y="144" width="20" height="22" rx="6"/>
    <rect x="308" y="144" width="20" height="22" rx="6"/>

    <!-- bottom pins -->
    <rect x="200" y="292" width="20" height="22" rx="6"/>
    <rect x="236" y="292" width="20" height="22" rx="6"/>
    <rect x="272" y="292" width="20" height="22" rx="6"/>
    <rect x="308" y="292" width="20" height="22" rx="6"/>

    <!-- left pins -->
    <rect x="164" y="188" width="22" height="20" rx="6"/>
    <rect x="164" y="224" width="22" height="20" rx="6"/>
    <rect x="164" y="260" width="22" height="20" rx="6"/>

    <!-- right pins -->
    <rect x="326" y="188" width="22" height="20" rx="6"/>
    <rect x="326" y="224" width="22" height="20" rx="6"/>
    <rect x="326" y="260" width="22" height="20" rx="6"/>
  </g>

  <!-- Secure "lock" mark (simple, bold) -->
  <g>
    <!-- shackle -->
    <path
      d="M224 220
         C224 196 240 180 256 180
         C272 180 288 196 288 220
         V232
         H272
         V220
         C272 206 264 198 256 198
         C248 198 240 206 240 220
         V232
         H224
         V220
         Z"
      fill="#22C55E"
    />
    <!-- body -->
    <rect x="220" y="232" width="72" height="64" rx="16" fill="#22C55E"/>
    <!-- keyhole (knockout look using slate fill) -->
    <path
      d="M256 250
         C247 250 240 257 240 266
         C240 273 244 279 250 282
         V296
         H262
         V282
         C268 279 272 273 272 266
         C272 257 265 250 256 250
         Z"
      fill="#1E293B"
      opacity="0.95"
    />
  </g>

  <!-- Small circuit traces to hint "secure core" -->
  <g stroke="#06B6D4" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <path d="M184 196 H208" />
    <path d="M304 196 H328" />
    <path d="M184 272 H208" />
    <path d="M304 272 H328" />
  </g>

  <!-- === THREE LINKED LAYER BARS (gateway, database, runtime) === -->
  <!-- Connectors from hex to bars -->
  <g stroke="#1E293B" stroke-width="18" stroke-linecap="round" opacity="1">
    <path d="M224 408 V424" />
    <path d="M256 408 V424" />
    <path d="M288 408 V424" />
  </g>

  <!-- Bars container (strong silhouette) -->
  <!-- Top bar -->
  <rect x="150" y="424" width="212" height="28" rx="14" fill="#1E293B"/>
  <!-- Middle bar -->
  <rect x="166" y="460" width="180" height="28" rx="14" fill="#1E293B"/>
  <!-- Bottom bar -->
  <rect x="182" y="496" width="148" height="28" rx="14" fill="#1E293B"/>

  <!-- Link accents (small "chain" nodes) -->
  <g>
    <!-- left link column -->
    <circle cx="170" cy="438" r="8" fill="#06B6D4"/>
    <circle cx="170" cy="474" r="8" fill="#22C55E"/>
    <circle cx="170" cy="510" r="8" fill="#06B6D4"/>

    <!-- right link column -->
    <circle cx="342" cy="438" r="8" fill="#22C55E"/>
    <circle cx="342" cy="474" r="8" fill="#06B6D4"/>
    <circle cx="342" cy="510" r="8" fill="#22C55E"/>

    <!-- subtle link bridges (flat strokes) -->
    <g stroke-width="10" stroke-linecap="round" opacity="0.95">
      <path d="M178 438 H198" stroke="#06B6D4"/>
      <path d="M178 474 H198" stroke="#22C55E"/>
      <path d="M178 510 H198" stroke="#06B6D4"/>

      <path d="M314 438 H334" stroke="#22C55E"/>
      <path d="M314 474 H334" stroke="#06B6D4"/>
      <path d="M314 510 H334" stroke="#22C55E"/>
    </g>
  </g>

  <!-- Tiny “layer” ridges to read at small sizes -->
  <g stroke="#06B6D4" stroke-width="6" stroke-linecap="round" opacity="0.9">
    <path d="M200 438 H312"/>
    <path d="M214 474 H298"/>
    <path d="M228 510 H284"/>
  </g>
</svg>
